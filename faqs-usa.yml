faqs:
  - question: HOW DOES THE PINTER WORK?
    answer: The easiest way to brew award-winning fresh beer at home. Simply pour our proprietary Fresh Press ingredient packs into the Pinter, add water, mix, and let it brew. In just a few days, you’ll have 12 pints of incredibly fresh draft beer ready to tap right from your fridge. No heavy equipment, no hassle, and no mess.
    
  - question: WHAT IS A CO-PINTER?
    answer: A Co-Pinter is the ultimate add-on to your Pinter, a second core that enables you to start brewing your next beer while conditioning or tapping another. In tandem with your original Pinter, the Co-Pinter gives you the freedom to tap and taste your beers one after another on your terms. The true Pinter lifestyle.
    
  - question: WHAT BEERS ARE AVAILABLE?
    answer: We offer an ever-expanding taproom of world-class styles, including crisp Lagers, hazy IPAs, rich Stouts, and refreshing Ciders. We collaborate with some of the most recognized breweries in the world to bring their iconic beers directly to your home. The quality speaks for itself - in 2025, Pinter was named World Microbrewery of the Year at the World Beer Awards.
    
  - question: HOW LONG DOES BEER STAY FRESH?
    answer: Once brewed, your beer stays fresh in the Pinter for up to 30 days.

  - question: DO I PAY MORE FOR PREMIUM BEER STYLES?
    answer: >-
      Master Brewer: No. Your $35/mo flat rate covers any beer style you choose, even our most expensive specialty packs. You will never see a surcharge or shipping fee.
      
      
      Fresh Brewer & Pinter Only: Yes. Because you pay per delivery, your cost will vary depending on the style (starting at $63 minimum for a 2-pack order, up to higher tiers reserved for specialty releases like our 9% Imperial Stout), plus shipping.

  - question: WHICH SETUP IS RIGHT FOR ME?
    answer: >-
      Master Brewer (The Ultimate Setup): You pay $0 today. You lock in a flat rate of $35/month for 24 months (0% APR with Affirm) which covers your hardware (Free Pinter + Free Co-Pinter), 26 total Beer Packs, a 2-Year Care Plan, and all shipping. Your first 2 beers ship immediately. You unlock a full 24-month access window to claim your remaining 24-beer allocation, giving you total freedom to brew and tap on your exact schedule.
      
      
      Fresh Brewer (Pay per Delivery): You pay $0 today (includes a free Pinter, Care Plan, and your first 2 beers). Moving forward, you pay only when your next batch ships. You simply complete your first 6 future deliveries (12 beers total) to keep your Pinter completely free, and you control the delivery schedule.
      
  - question: HOW DOES THE 0% APR AFFIRM FINANCING WORK?
    answer: "We partner with Affirm to offer the Master Brewer plan at $35/month for 24 months at 0% APR (Total $840). Checking your eligibility at checkout is a \"soft pull\" and will not affect your credit. There are no hidden fees, no late fees, and no compounding interest. Payment options through Affirm are subject to an eligibility check and are provided by these lending partners: affirm.com/lenders."
    
  - question: WHAT IS THE CANCELLATION & RETURN POLICY?
    answer: >-
      1-Hour 1-Click Cancellation: Made a mistake? You have a full hour immediately after checkout to easily cancel your order with a single click from your confirmation page.
      
      
      The 30-Day Guarantee: Every Pinter comes with a 30-Day Risk-Free trial. If it's not for you, return the hardware within 30 days and we will completely cancel your Affirm agreement or delivery plan with zero penalty.
      
      
      Total Flexibility (Master Brewer): If your lifestyle changes after 30 days, you can easily transition to owning your gear outright. We simply calculate the retail value of the hardware you're keeping and the beers you've enjoyed, then instantly clear your remaining Affirm balance. You only pay for what you've used.
      
      
      After 30 days (Fresh Brewer): If you choose to stop your subscription before completing your first 6 deliveries, you simply purchase your Pinter machine outright by covering the $199 deferred hardware cost.
