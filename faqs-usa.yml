faqs:
  - question: HOW DOES THE PINTER WORK?
    answer: The easiest way to brew award-winning fresh beer at home. Simply pour our proprietary Fresh Press ingredient packs into the Pinter, add water, mix, and let it brew. In just a few days, you’ll have 12 pints of incredibly fresh draft beer ready to tap right from your fridge. No heavy equipment, no hassle, and no mess.
    
  - question: WHAT IS A CO-PINTER?
    answer: The perfect add-on companion to your Pinter. While one Pinter is in the fridge chilling, you can use the Co-Pinter with your Pinter’s brewing dock to immediately start brewing your next batch so you always have fresh beer on tap. A Co-Pinter is included exclusively with our Master Brewer plan.
    
  - question: WHAT BEERS ARE AVAILABLE?
    answer: A taproom in your fridge. We offer an ever-expanding selection of world-class styles, including crisp Lagers, hazy IPAs, rich Stouts, refreshing Ciders, and seasonal specials. We collaborate with some of the most recognized breweries in the world to bring their iconic beers directly to your home. The quality speaks for itself - in 2025, Pinter was named World Microbrewery of the Year at the World Beer Awards.
    
  - question: ARE THESE OFFERS FOR REAL?
    answer: Yes! Think of it like getting a flagship cell phone included when you sign up for a premium network plan. By choosing your beer delivery plan today, your award-winning Pinter hardware is fully included with your plan.
    
  - question: WHICH DELIVERY PLAN IS RIGHT FOR ME?
    answer: >-
      Master Brewer (The Ultimate Setup) - The smartest choice for regular brewers. You get the Pinter, the Co-Pinter, and our exclusive 2-Year Care Plan. Best of all, your hardware, 26 total Beer Packs, and all shipping costs are bundled into one easy monthly payment. You lock in your price and never pay higher rates for premium styles.
      
      
      Fresh Brewer (The Starter Kit) - Perfect for beginners who want to pay as they go. You get a free Pinter included with your 7-delivery plan. You pay for your Beer Packs and shipping only as they are delivered.
      
  - question: HOW MUCH DO BEER PACKS COST?
    answer: >-
      On the Master Brewer Plan - Zero extra cost. Your flat $49/mo Affirm payment covers 26 Beer Packs (your first 2 today, plus 24 more on your schedule), regardless of which premium styles you choose. All hardware and beer shipping is fully included with your plan.
      
      
      On the Fresh Brewer or Pinter-Only Plan - Beer Packs feature variable pricing based on the style, ranging from $26 to $46 for our highest ABV premium packs, plus $9.99 shipping per delivery.
      
  - question: WHEN AM I CHARGED & HOW DO DELIVERIES WORK?
    answer: >-
      Master Brewer - You securely check out using Affirm and pay $0 today. Affirm handles your flat $49/mo payment at 0% APR. We ship your hardware and first 2 Beer Packs immediately. After that, your remaining 24 pre-paid Beer Packs ship on your preferred schedule (every 4, 6, or 8 weeks), with a minimum of 2 Beer Packs per delivery. You are completely free to log in and adjust your delivery dates whenever you need. You have zero extra delivery charges.
      
      
      Fresh Brewer - Your first delivery starts at $62 today. Moving forward, you simply pay per delivery for a minimum of 6 future orders. You control the schedule (every 4, 6, or 8 weeks) with a minimum of 2 Beer Packs per delivery, and are completely free to log in and adjust your delivery dates whenever you need. You only pay when your next batch ships.
      
  - question: WHAT IS THE PINTER CARE PLAN?
    answer: It is an upgraded warranty that covers your entire brewing experience, included exclusively with the Master Brewer plan (2-Year Care Plan). This doesn't just cover hardware replacements; if anything goes wrong with your brew, the Pinter Care Team will help troubleshoot and even replace your ingredients entirely free of charge.
    
  - question: HOW DOES THE 0% AFFIRM FINANCING WORK?
    answer: We partner with Affirm to make the Master Brewer plan incredibly accessible. When you select Master Brewer and proceed to checkout, you’ll fill out a quick, secure application with Affirm. Checking your eligibility will not affect your credit score. If approved, you pay $0 today and lock in exactly $49/month + applicable taxes for 24 months at 0% APR. There are no hidden fees, no late fees, and no compounding interest. What you see is exactly what you pay.
    
  - question: WHAT IS YOUR RETURN POLICY & CAN I CANCEL?
    answer: >-
      Try it entirely risk-free for 30 days. We want you to love your Pinter. If you don't, let us know within 30 days, send the hardware back, and we will completely cancel your Affirm agreement or your Fresh Brewer subscription. Zero hoops to jump through.
      
      
      After 30 days (Master Brewer) - Your bundled Affirm financing becomes non-refundable, but you keep total control over your delivery schedule to use your 24 pre-paid Beer Packs at whatever pace suits you over 24 months.
      
      
      After 30 days (Fresh Brewer) - Your delivery plan continues until you reach your 7-delivery minimum. If you need to stop early, you simply cover the $199 deferred hardware charge for your Pinter. Once your 7th delivery is complete, you can easily pause or cancel future shipments via your account portal with zero fees.
