                    <li><strong>Taproom VIP Pass:</strong> No. Your all-inclusive pass covers <em>any</em> beer style you choose. Whether you want a crisp lager or our most premium, high-ABV specialty releases, you will never see a surcharge.</li>
                    <li><strong>Fresh Brewer & Pinter Only:</strong> Yes. Because you pay as you go, your cost will simply reflect the specific retail price of the styles you select.</li>
                </ul>
            </div>
        </details>
        
      <details class="faq-item">
            <summary class="faq-question">WHICH PLAN IS RIGHT FOR ME?</summary>
            <div class="faq-answer">
              <ul>
                <li><strong>Taproom VIP (All Inclusive):</strong> Best for beer enthusiasts who want maximum value. You secure a year's worth of brewing (hardware, delivery, and 14 premium beer packs) for one flat, predictable rate.</li>
                <li><strong>Fresh Brewer (Pay per Delivery):</strong> Best for the casual brewer who prefers to pay as they go. You get the Free Pinter today, and only pay for your beer packs when your next scheduled delivery processes.</li>
                <li><strong>Pinter Only (Hardware Only):</strong> Best for gifting or those curious about home brewing. You get the standalone machine today, allowing you (or your gift recipient) to buy fresh Beer Packs whenever you want.</li>
              </ul>
              <em>Note: Both delivery plans (VIP and Fresh Brewer) allow you to control your schedule via your account.</em>
            </div>
        </details>

