faqs:
  - question: HOW DOES THE PINTER WORK?
    answer: The Pinter is a unique self-contained device in which brewing - from fermentation to conditioning - is streamlined without sacrificing any quality. Add water, yeast and your Fresh Press then let the Pinter do the heavy lifting before tapping 12 Pints of Fresh Beer.
  - question: WHAT IS A CO-PINTER?
    answer: A Co-Pinter is the perfect add-on companion to your Pinter, a second core that enables you to start brewing your next beer while conditioning or tapping another. In tandem with your original Pinter, the Co-Pinter gives you the freedom to tap and taste your beers one after another on your terms. The true Pinter lifestyle.
  - question: ARE THESE OFFERS FOR REAL?
    answer: Yes! With Fresh Brewer, you'll receive the award-winning Pinter all-in-one home brew and draft machine absolutely FREE when you order 2 beers today plus 6 more times (minimum 2 beers each). With Master Brewer, you’ll also receive a FREE Co-Pinter, a FREE Tasting Glass, and a $50 beer discount when you order 2 beers today plus 12 more orders (minimum 2 beers each). You only pay for the beers. Pay As You Go has no minimum commitment, just pay for your Pinter and order online whenever you want.
  - question: 100% SATISFACTION GUARANTEE
    answer: We stand behind our products. If you don’t love your Pinter, we offer a 30-day money back guarantee starting from the day you receive it. Every Pinter also comes with a 1-year warranty.
  - question: WHAT BEERS ARE AVAILABLE?
    answer: We offer a range of beers which include lagers, IPAs, pale ales, stouts, fruit sours, and wheat beers. We collaborate with some of the best breweries in the world to produce recipes - as well as our own house recipes, many of which have won international beer awards. We also offer a range of seasonal hard ciders and hardseltzers. Our current range will be visible when selecting your beers.
  - question: HOW MUCH DO BEERS COST?
    answer: Each pack (to make 12 Pints) typically varies in price between $25.99-38.99 depending on style. Our current prices will be visible when selecting your beers.
  - question: CAN I CANCEL?
    answer: You can cancel anytime after completing your plan (6 orders after today's order for Fresh brewer). A minimum of 2 beers need to be selected for each order.). PAYG has no minimum orders and can be cancelled anytime. Early cancellation from Fresh Brewer will include a hardware charge.
  - question: HOW DOES THE DELIVERY PLAN WORK?
    answer: You’ll receive an email reminder before each scheduled delivery, giving you time to select your beers for that order. Your selected beers are automatically ordered based on your schedule, so you'll never run out. Just pick your styles (a minimum of 2 per order), and we'll deliver them to your door. Choose your preferred delivery frequency in your online account - every 4, 6, or 8 weeks. You can change your frequency in your delivery plan account to suit your brewing pace.
  - question: WHICH PLAN IS RIGHT FOR ME?
    answer: >-
      Master Brewer - Best for hosts and regular brewers - always have beer ready for game days and gatherings. Get a Free Pinter, Co-Pinter, and Free Tasting Glass to start you on your journey so you can brew one while tapping the other.
      
      
      Fresh Brewer - A great starting point for the more casual brewer. Get a Free Pinter to make 12 pints of delicious fresh beer.


  - question: WHEN AM I CHARGED?
    answer: You're charged when each order is placed. The first charge happens at the checkout today. Future orders are automatic based on your delivery schedule, and you'll receive an email reminder before each one.
  - question: HOW LONG DOES BEER STAY FRESH?
    answer: Once brewed, your beer stays fresh in the Pinter for up to 30 days.
  - question: DOES MY PINTER COME WITH A WARRANTY?
    answer: Pinter and Co-Pinter devices are supplied with a manufacturer's warranty. Full details of the warranty, including coverage, exclusions, and how to make a claim, are available at https://pinter.com/pages/warranty
