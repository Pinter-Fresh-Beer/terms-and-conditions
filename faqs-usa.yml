<div class="faq-container">
        <h3 class="faq-header">Frequently Asked Questions</h3>
        
        <details class="faq-item">
            <summary class="faq-question">HOW DOES THE PINTER WORK?</summary>
            <div class="faq-answer">
                The easiest way to brew award-winning fresh beer at home. Simply pour our proprietary Fresh Press ingredient packs into the Pinter, add water, mix, and let it brew. In just a few days, you’ll have 12 pints of incredibly fresh draft beer ready to tap right from your fridge. No heavy equipment, no hassle, and no mess.
            </div>
        </details>

        <details class="faq-item">
            <summary class="faq-question">WHAT BEERS ARE AVAILABLE?</summary>
            <div class="faq-answer">
                We offer an ever-expanding taproom of world-class styles, including crisp Lagers, hazy IPAs, rich Stouts, and refreshing Ciders. We collaborate with some of the most recognized breweries in the world to bring their iconic beers directly to your home. The quality speaks for itself - in 2025, Pinter was named World Microbrewery of the Year at the World Beer Awards.
            </div>
        </details>

        <details class="faq-item">
            <summary class="faq-question">HOW LONG DOES BEER STAY FRESH?</summary>
            <div class="faq-answer">
                Once brewed, your beer stays fresh in the Pinter for up to 30 days.
            </div>
        </details>

        <details class="faq-item">
            <summary class="faq-question">DO I PAY MORE FOR PREMIUM BEER STYLES?</summary>
            <div class="faq-answer">
