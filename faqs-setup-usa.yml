faqs:
  - question: ARE THESE OFFERS FOR REAL?
    answer: Yes! We will give you the award-winning Pinter home taproom absolutely FREE when you stock up on your first rounds of fresh beer. We invest in your hardware so you can experience flawless draught beer at home - you simply pay for the beers.
  - question: HOW MUCH DO THE BEERS COST?
    answer: Enjoying premium draught beer at home is a great way to save on bar tabs! Each Fresh Press pack makes 12 perfect pints, typically varying between $25.99–$38.99 depending on style and ABV. That means your fresh brewing journey starts at just over $2 a pint - a fraction of the taproom markup.
  - question: WHAT BEERS ARE AVAILABLE?
    answer: We offer an ever-expanding taproom of world-class styles, including crisp Lagers, hazy IPAs, rich Stouts, and refreshing Ciders. We collaborate with some of the most recognized breweries in the world to bring their iconic beers directly to your home. The quality speaks for itself - in 2025, Pinter was named World Microbrewery of the Year at the World Beer Awards.
  - question: HOW DOES THE PINTER WORK?
    answer: The easiest way to brew award-winning fresh beer at home. Simply pour our proprietary Fresh Press ingredient packs into the Pinter, add water, mix, and let it brew. In just a few days, you’ll have 12 pints of incredibly fresh draft beer ready to tap right from your fridge. No heavy equipment, no hassle, and no mess.
  - question: WHAT IS A CO-PINTER?
    answer: The Co-Pinter is the ultimate upgrade to your brewing setup. It is a second core that allows you to start brewing your next beer while your current one is still conditioning or being tapped. It keeps your taps flowing without interruption.
  - question: HOW LONG DOES THE BEER STAY FRESH?
    answer: Once your brew is complete, your beer stays perfectly fresh and carbonated in the Pinter for up to 30 days, allowing you to enjoy at your own pace.
  - question: WHICH SETUP IS RIGHT FOR ME?
    answer: |-
      Master Brewer: The ultimate setup for hosts and dedicated crafters. You get a Free Pinter, a Free Co-Pinter (so you can brew one while tapping another), and a massive discount on your initial beers.
      
      Fresh Brewer: The perfect starting point for the casual brewer, including a Free Pinter to brew 12 pints of delicious fresh beer.
      
      Pinter Only: Best for gifting or those curious about home brewing. You get the standalone machine today, allowing you (or your gift recipient) to buy fresh Beer Packs whenever you want.
  - question: HOW DOES THE DELIVERY PLAN WORK?
    answer: Your Delivery Plan is designed so you never run out of fresh beer. You choose your frequency (every 4, 6, or 8 weeks), and we’ll send a reminder before every order so you can swap your beer styles. You are always in control and can easily adjust your pace in your account.
  - question: WHEN AM I CHARGED?
    answer: You are only charged for what ships today. Future orders are billed automatically based on your chosen delivery schedule, and you will always receive a clear email reminder before any upcoming charge.
  - question: CAN I CANCEL MY PLAN?
    answer: Absolutely. You can cancel your Delivery Plan at any time. If you choose to exit early before completing your plan, you simply cover the remaining balance of the hardware you keep. Pinter Only setups have no minimum orders and beers can be purchased directly from our online store.
  - question: DOES MY SETUP COME WITH A WARRANTY?
    answer: Yes. All Pinter and Co-Pinter hardware comes with a comprehensive 1-year manufacturer’s warranty so you can begin your brewing journey with total peace of mind.
  - question: WHAT IS THE CANCELLATION & RETURN POLICY?
    answer: |-
      1-Hour 1-Click Cancellation: Made a mistake? You have a full hour immediately after checkout to easily cancel your order with a single click right from your confirmation page.
      
      The 30-Day Guarantee: Every Pinter comes with a 30-Day Risk-Free trial. If it's not for you, return the hardware within 30 days and we will refund your order and cancel your delivery plan with zero penalty.
      
      Flexible Long-Term Options: After your 30-day trial, your plan remains flexible. You can always transition to owning your gear outright or adjust your delivery schedule right from your account.
