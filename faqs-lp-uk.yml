faqs:
  - question: IS THIS OFFER FOR REAL?
    answer: Yes! We will give you the award-winning Pinter brew and tap machine absolutely FREE when you stock up on your first rounds of fresh beer. We invest in your hardware so you can experience flawless draught beer at home - you simply pay for the beers.
  - question: HOW MUCH DO THE BEERS COST?
    answer: Enjoying premium draught beer at home is a great way to save on pub rounds! Each Fresh Press pack makes 10 perfect pints, typically varying between £14.99-24.99 depending on style and ABV. That means your fresh brewing journey starts at just under £1.80 a pint - a fraction of pub prices.
  - question: WHAT BEERS ARE AVAILABLE?
    answer: We offer an ever-expanding taproom of world-class styles, including crisp Lagers, hazy IPAs, rich Stouts, and refreshing Ciders. We collaborate with some of the most recognised breweries in the world to bring their iconic beers directly to your home. The quality speaks for itself - in 2025, Pinter was named World Microbrewery of the Year at the World Beer Awards.
  - question: HOW DOES THE PINTER WORK?
    answer: The easiest way to brew award-winning fresh beer at home. Simply pour our exclusively crafted Fresh Press ingredient packs into the Pinter, add water, mix, and let it brew. In just a few days, you’ll have 10 pints of incredibly fresh draught beer ready to tap right from your fridge. No heavy equipment, no hassle, and no mess.
  - question: HOW LONG DOES THE BEER STAY FRESH?
    answer: Once your brew is complete, your beer stays perfectly fresh and carbonated in the Pinter for up to 30 days, allowing you to enjoy at your own pace.
  - question: 100% SATISFACTION GUARANTEE
    answer: We stand entirely behind our hardware. If you don’t love your Pinter, we offer a 30-day money-back guarantee starting from the day your Pinter is shipped.
